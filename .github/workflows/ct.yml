name: Continuous Training — Crack Segmentation

on:
  push:
    branches:
      - main
    paths:
      - 'crack-seg.dvc'
      - 'train.py'
      - 'validate_dataset.py'
      - 'requirements.txt'
      - 'README.md'

  workflow_dispatch:

env:
  AWS_REGION:    us-east-1
  MODELS_BUCKET: mlsecops-models-351611731527
  TF_WORKING_DIR: infra

jobs:
  train:
    name: Provision EC2 + Train + Destroy
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.CT_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CT_AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="git_sha=${{ github.sha }}" \
            -var="repo_url=https://github.com/${{ github.repository }}.git"

      - name: Compute model filename
        id: model
        run: |
          SHA7="${{ github.sha }}"
          SHA7="${SHA7:0:7}"
          DATE=$(date -u +%Y%m%d)
          MODEL_NAME="crack_seg_${SHA7}_${DATE}.pt"
          MODEL_KEY="crack-seg/${{ github.sha }}/${MODEL_NAME}"
          echo "name=${MODEL_NAME}" >> $GITHUB_OUTPUT
          echo "key=${MODEL_KEY}"   >> $GITHUB_OUTPUT
          echo "Model key: ${MODEL_KEY}"

      - name: Wait for model in S3
        timeout-minutes: 60
        run: |
          echo "Waiting for: s3://${{ env.MODELS_BUCKET }}/${{ steps.model.outputs.key }}"

          MAX_ATTEMPTS=120
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if aws s3api head-object \
              --bucket ${{ env.MODELS_BUCKET }} \
              --key "${{ steps.model.outputs.key }}" 2>/dev/null; then
              echo "Model found in S3 - training complete!"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — waiting 30s..."
            sleep 30
          done

          echo "ERROR: Model not found after 60 minutes"
          exit 1

      - name: Terraform Destroy
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="git_sha=${{ github.sha }}" \
            -var="repo_url=https://github.com/${{ github.repository }}.git"

      - name: Register model in MLflow
        if: success()
        run: |
          pip install mlflow boto3 --quiet
          python - <<'EOF'
          import mlflow
          import os

          model_name = "${{ steps.model.outputs.name }}"
          model_key  = "${{ steps.model.outputs.key }}"
          bucket     = "${{ env.MODELS_BUCKET }
