name: Continuous Training — Crack Segmentation

on:
  push:
    branches:
      - main
    paths:
      - 'crack-seg.dvc'
      - 'train.py'
      - 'validate_dataset.py'
      - 'requirements.txt'
      - 'README.md'

  workflow_dispatch:

env:
  AWS_REGION:    us-east-1
  MODELS_BUCKET: mlsecops-models-351611731527

jobs:
  train:
    name: Kaggle GPU Training
    runs-on: ubuntu-latest

    steps:

      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── AWS credentials (for S3 polling + MLflow) ───────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.CT_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CT_AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps for runner
        run: pip install requests mlflow boto3 --quiet

      # ── Push code to Kaggle + trigger notebook ──────────────────────────────
      - name: Trigger Kaggle training
        env:
          KAGGLE_API_TOKEN:          ${{ secrets.KAGGLE_API_TOKEN }}
          CT_AWS_ACCESS_KEY_ID:      ${{ secrets.CT_AWS_ACCESS_KEY_ID }}
          CT_AWS_SECRET_ACCESS_KEY:  ${{ secrets.CT_AWS_SECRET_ACCESS_KEY }}
          GIT_SHA:                   ${{ github.sha }}
        run: python scripts/run_kaggle.py

      # ── Compute expected model filename ─────────────────────────────────────
      - name: Compute model filename
        id: model
        run: |
          SHA7="${{ github.sha }}"
          SHA7="${SHA7:0:7}"
          DATE=$(date -u +%Y%m%d)
          MODEL_NAME="crack_seg_${SHA7}_${DATE}.pt"
          MODEL_KEY="crack-seg/${{ github.sha }}/${MODEL_NAME}"
          echo "name=${MODEL_NAME}" >> $GITHUB_OUTPUT
          echo "key=${MODEL_KEY}"   >> $GITHUB_OUTPUT
          echo "Model key: ${MODEL_KEY}"

      # ── Poll S3 for model — presence = training done ─────────────────────────
      - name: Wait for model in S3
        timeout-minutes: 60
        run: |
          echo "Waiting for: s3://${{ env.MODELS_BUCKET }}/${{ steps.model.outputs.key }}"
          aws s3api wait object-exists \
            --bucket ${{ env.MODELS_BUCKET }} \
            --key    ${{ steps.model.outputs.key }}
          echo "Model found - training complete"

      # ── Register model in MLflow ─────────────────────────────────────────────
      - name: Register model in MLflow
        if: success()
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          python - <<'EOF'
          import mlflow
          import os

          model_name = "${{ steps.model.outputs.name }}"
          model_key  = "${{ steps.model.outputs.key }}"
          bucket     = "${{ env.MODELS_BUCKET }}"
          git_sha    = os.environ["GIT_SHA"]

          mlflow.set_tracking_uri("s3://mlsecops-mlflow-351611731527")
          client = mlflow.tracking.MlflowClient()

          runs = client.search_runs(
              experiment_ids=["1"],
              filter_string=f"params.dataset_version = '{git_sha}'"
          )

          if not runs:
              print(f"No MLflow run found for git_sha={git_sha}")
              exit(1)

          run_id = runs[0].info.run_id
          mv = mlflow.register_model(
              model_uri=f"runs:/{run_id}/weights",
              name="crack-seg"
          )
          print(f"Model registered: crack-seg v{mv.version}")
          EOF
