name: Continuous Training — Crack Segmentation

on:
  push:
    branches:
      - main
    paths:
      - 'crack-seg.dvc'
      - 'train.py'
      - 'validate_dataset.py'
      - 'requirements.txt'
      - 'README.md'

  workflow_dispatch:

env:
  AWS_REGION:    us-east-1
  MODELS_BUCKET: mlsecops-models-351611731527
  TF_WORKING_DIR: infra

jobs:
  train:
    name: Provision EC2 + Train + Destroy
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.CT_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CT_AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="git_sha=${{ github.sha }}" \
            -var="repo_url=https://github.com/${{ github.repository }}.git"

      - name: Compute model filename
        id: model
        run: |
          SHA7="${{ github.sha }}"
          SHA7="${SHA7:0:7}"
          DATE=$(date -u +%Y%m%d)
          MODEL_NAME="crack_seg_${SHA7}_${DATE}.pt"
          MODEL_KEY="crack-seg/${{ github.sha }}/${MODEL_NAME}"
          echo "name=${MODEL_NAME}" >> $GITHUB_OUTPUT
          echo "key=${MODEL_KEY}"   >> $GITHUB_OUTPUT
          echo "Model key: ${MODEL_KEY}"

      - name: Wait for model in S3
        timeout-minutes: 60
        run: |
          MODEL_KEY="${{ steps.model.outputs.key }}"
          BUCKET="${{ env.MODELS_BUCKET }}"
          echo "Waiting for: s3://${BUCKET}/${MODEL_KEY}"

          MAX_ATTEMPTS=120
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if aws s3api head-object \
              --bucket "${BUCKET}" \
              --key "${MODEL_KEY}" 2>/dev/null; then
              echo "Model found in S3 - training complete!"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — waiting 30s..."
            sleep 30
          done

          echo "ERROR: Model not found after 60 minutes"
          exit 1

      - name: Terraform Destroy
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="git_sha=${{ github.sha }}" \
            -var="repo_url=https://github.com/${{ github.repository }}.git"

      - name: Register model in MLflow
        if: success()
        env:
          MODEL_NAME:        ${{ steps.model.outputs.name }}
          MODEL_KEY:         ${{ steps.model.outputs.key }}
          GIT_SHA:           ${{ github.sha }}
          MLFLOW_SERVER_URL: http://34.193.177.88
        run: |
          pip install mlflow boto3 --quiet
          python - <<'EOF'
          import mlflow
          import os
          model_name = os.environ["MODEL_NAME"]
          git_sha    = os.environ["GIT_SHA"]
          mlflow_url = os.environ["MLFLOW_SERVER_URL"]

          mlflow.set_tracking_uri(mlflow_url)
          client = mlflow.tracking.MlflowClient()

          experiment = client.get_experiment_by_name("crack-seg-training")
          if not experiment:
              print("ERROR: Experiment 'crack-seg-training' not found in MLflow")
              exit(1)

          runs = client.search_runs(
              experiment_ids=[experiment.experiment_id],
              filter_string=f"params.dataset_version = '{git_sha}'"
          )
          if not runs:
              print(f"No MLflow run found for git_sha={git_sha}")
              exit(1)

          run_id = runs[0].info.run_id
          mv = mlflow.register_model(
              model_uri=f"runs:/{run_id}/weights",
              name="crack-seg"
          )
          print(f"Model registered: crack-seg v{mv.version}")
          EOF
